<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bookmark Vault Ultimate</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#07090f;
  --surface:#11151d;
  --surface2:#181e29;
  --line:rgba(255,255,255,0.08);
  --text:#f4f7fb;
  --muted:#97a2b3;
  --accent:#8ab4ff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:
  radial-gradient(circle at top left,
  rgba(138,180,255,0.10),
  transparent 25%),
  var(--bg);

  color:var(--text);
  min-height:100vh;
}

.panel{
  background:rgba(255,255,255,0.03);
  border:1px solid var(--line);
  border-radius:24px;
  backdrop-filter:blur(18px);
}

.input{
  width:100%;
  background:var(--surface2);
  border:1px solid rgba(255,255,255,0.08);
  color:white;
  border-radius:16px;
  padding:13px 16px;
  outline:none;
  transition:0.2s;
}

.input:focus{
  border-color:rgba(138,180,255,0.5);
  box-shadow:0 0 0 4px rgba(138,180,255,0.08);
}

.btn{
  border:none;
  cursor:pointer;
  transition:0.2s;
  border-radius:14px;
  font-weight:600;
  padding:11px 16px;
}

.btn:hover{
  transform:translateY(-1px);
}

.btn-primary{
  background:linear-gradient(135deg,#8ab4ff,#6ee7ff);
  color:#07111f;
}

.btn-secondary{
  background:rgba(255,255,255,0.06);
  color:white;
}

.card{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:18px;
  transition:0.25s;
  overflow:hidden;
}

.card:hover{
  border-color:rgba(138,180,255,0.25);
  transform:translateY(-2px);
}

.favicon{
  width:38px;
  height:38px;
  border-radius:10px;
  background:#0b1017;
  padding:6px;
  object-fit:contain;
}

.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#121926;
  border:1px solid rgba(255,255,255,0.08);
  padding:14px 18px;
  border-radius:16px;
  display:none;
  z-index:999;
}

.scrollbar::-webkit-scrollbar{
  width:8px;
}

.scrollbar::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,0.1);
  border-radius:999px;
}

</style>
</head>

<body>

<div class="max-w-[1500px] mx-auto px-5 py-8">

<header class="flex flex-col lg:flex-row gap-6 justify-between items-start mb-8">

<div>
<h1 class="text-5xl font-extrabold tracking-tight">
Bookmark Vault
</h1>

<p class="text-[#97a2b3] mt-3">
Gestionnaire de favoris moderne et compact
</p>
</div>

<div class="flex gap-3 flex-wrap">

<button id="exportBtn" class="btn btn-secondary">
Exporter
</button>

<div id="stats" class="panel px-5 py-3 text-sm flex gap-5"></div>

</div>

</header>

<div class="grid grid-cols-1 lg:grid-cols-12 gap-6">

<div class="lg:col-span-8">

<div class="panel p-5">

<div class="flex flex-col xl:flex-row gap-4 justify-between mb-5">

<div class="flex flex-wrap gap-3 flex-1">

<input
id="search"
class="input xl:max-w-[300px]"
placeholder="Rechercher..."
>

<select id="sortSelect" class="input w-[180px]">
<option value="newest">Plus récents</option>
<option value="oldest">Plus anciens</option>
<option value="alpha">Alphabétique</option>
<option value="category">Catégorie</option>
</select>

</div>

<button id="importBtn" class="btn btn-primary">
Importer
</button>

</div>

<div id="categoryFilters" class="flex flex-wrap gap-2 mb-5"></div>

<div
id="cards"
class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4 scrollbar">
</div>

</div>

</div>

<div class="lg:col-span-4">

<div class="panel p-5 sticky top-5">

<h2 class="text-2xl font-bold mb-6">
Ajouter un favori
</h2>

<form id="addForm" class="space-y-4">

<input
id="title"
class="input"
placeholder="Nom du site"
required
>

<input
id="url"
class="input"
placeholder="https://..."
required
>

<input
id="category"
class="input"
placeholder="Catégorie"
>

<button type="submit" class="btn btn-primary w-full">
Ajouter le favori
</button>

</form>

<div
id="dropZone"
class="mt-6 border border-dashed border-white/10 rounded-2xl p-8 text-center cursor-pointer hover:border-[#8ab4ff]/40 transition">

<p class="text-sm text-[#97a2b3] leading-6">
Glissez un fichier ici<br>
ou cliquez pour importer
</p>

<input
id="importFile"
type="file"
accept=".json,.txt,.html"
hidden
>

</div>

</div>

</div>

</div>

</div>

<div id="toast" class="toast"></div>

<script>

const STORAGE_KEY = "bookmark_vault_ultimate_final";

let bookmarks = [];

try{
  bookmarks = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
}catch{
  bookmarks = [];
}

let currentFilter = "";
let currentCategory = "";

function save(){

  localStorage.setItem(
    STORAGE_KEY,
    JSON.stringify(bookmarks)
  );

}

function showToast(message){

  const toast = document.getElementById("toast");

  toast.innerHTML = message;

  toast.style.display = "block";

  setTimeout(() => {
    toast.style.display = "none";
  },2200);

}

function validateUrl(url){

  try{

    new URL(
      url.startsWith("http")
      ? url
      : "https://" + url
    );

    return true;

  }catch{

    return false;

  }

}

function favicon(url){

  try{

    const domain = new URL(url).hostname;

    return `https://www.google.com/s2/favicons?sz=128&domain=${domain}`;

  }catch{

    return "https://via.placeholder.com/64?text=🔗";

  }

}

function updateStats(){

  const categories =
  new Set(
    bookmarks
    .map(b => b.category)
    .filter(Boolean)
  ).size;

  document.getElementById("stats").innerHTML = `

  <div>
    <strong>${bookmarks.length}</strong><br>
    Favoris
  </div>

  <div>
    <strong>${categories}</strong><br>
    Catégories
  </div>

  `;

}

function renderCategories(){

  const container =
  document.getElementById("categoryFilters");

  const categories =
  [...new Set(
    bookmarks
    .map(b => b.category)
    .filter(Boolean)
  )];

  container.innerHTML = "";

  const allBtn = document.createElement("button");

  allBtn.className =
  `btn ${currentCategory === '' ? 'btn-primary' : 'btn-secondary'}`;

  allBtn.textContent = "Tous";

  allBtn.onclick = () => filterCategory("");

  container.appendChild(allBtn);

  categories.forEach(cat => {

    const btn = document.createElement("button");

    btn.className =
    `btn ${currentCategory === cat ? 'btn-primary' : 'btn-secondary'}`;

    btn.textContent = cat;

    btn.onclick = () => filterCategory(cat);

    container.appendChild(btn);

  });

}

function filterCategory(cat){

  currentCategory = cat;

  render();

  renderCategories();

}

function render(){

  const cards = document.getElementById("cards");

  cards.innerHTML = "";

  let filtered = bookmarks.filter(b => {

    const text =
    (
      (b.title || "") +
      (b.url || "") +
      (b.category || "")
    ).toLowerCase();

    return text.includes(currentFilter.toLowerCase())
    &&
    (
      !currentCategory ||
      b.category === currentCategory
    );

  });

  const sort = document.getElementById("sortSelect").value;

  if(sort === "newest"){

    filtered.sort((a,b) =>
    new Date(b.createdAt) - new Date(a.createdAt));

  }

  else if(sort === "oldest"){

    filtered.sort((a,b) =>
    new Date(a.createdAt) - new Date(b.createdAt));

  }

  else if(sort === "alpha"){

    filtered.sort((a,b) =>
    (a.title || "").localeCompare(b.title || ""));

  }

  else if(sort === "category"){

    filtered.sort((a,b) =>
    (a.category || "").localeCompare(b.category || ""));

  }

  if(!filtered.length){

    cards.innerHTML = `
    <div class="col-span-full text-center py-16 text-[#97a2b3]">
      Aucun favori trouvé
    </div>
    `;

    return;

  }

  filtered.forEach(bookmark => {

    const card = document.createElement("div");

    card.className = "card p-4";

    card.innerHTML = `

    <div class="flex gap-3 items-start">

      <img
      src="${favicon(bookmark.url)}"
      class="favicon"
      onerror="this.src='https://via.placeholder.com/64?text=🔗'"
      >

      <div class="flex-1 min-w-0">

        <div class="font-semibold text-sm leading-tight truncate">
          ${bookmark.title || 'Sans titre'}
        </div>

        <div class="text-xs text-[#97a2b3] truncate mt-1">
          ${bookmark.url}
        </div>

        <div class="mt-3 flex items-center justify-between gap-2">

          <span class="px-3 py-1 rounded-full text-[11px] bg-white/5 text-[#8ab4ff] truncate max-w-[120px]">
            ${bookmark.category || 'Général'}
          </span>

        </div>

      </div>

    </div>

    <div class="mt-4 flex gap-2">

      <a
      href="${bookmark.url}"
      target="_blank"
      class="flex-1 text-center py-2 rounded-xl bg-white/5 hover:bg-white/10 transition text-sm">
      Ouvrir
      </a>

      <button
      onclick="editBookmark('${bookmark.id}')"
      class="px-3 py-2 rounded-xl bg-white/5 hover:bg-white/10 transition text-sm">
      ✏️
      </button>

      <button
      onclick="deleteBookmark('${bookmark.id}')"
      class="px-3 py-2 rounded-xl bg-red-500/10 text-red-400 hover:bg-red-500/20 transition text-sm">
      🗑
      </button>

    </div>

    `;

    cards.appendChild(card);

  });

}

function addBookmark(e){

  e.preventDefault();

  let url =
  document.getElementById("url")
  .value
  .trim();

  const title =
  document.getElementById("title")
  .value
  .trim();

  const category =
  document.getElementById("category")
  .value
  .trim();

  if(!url) return;

  if(!url.startsWith("http")){
    url = "https://" + url;
  }

  if(!validateUrl(url)){
    return showToast("❌ URL invalide");
  }

  if(bookmarks.some(b => b.url === url)){
    return showToast("⚠️ Favori déjà existant");
  }

  bookmarks.unshift({

    id: crypto.randomUUID(),

    title:
    title || new URL(url).hostname,

    url,

    category:
    category || 'Général',

    createdAt:
    new Date().toISOString()

  });

  save();

  render();

  updateStats();

  renderCategories();

  e.target.reset();

  showToast("✅ Favori ajouté");

}

function deleteBookmark(id){

  if(!confirm("Supprimer ce favori ?")) return;

  bookmarks = bookmarks.filter(b => b.id !== id);

  save();

  render();

  updateStats();

  renderCategories();

  showToast("Favori supprimé");

}

function editBookmark(id){

  const bookmark = bookmarks.find(b => b.id === id);

  if(!bookmark) return;

  const title = prompt(
    'Nouveau titre :',
    bookmark.title
  );

  if(title === null) return;

  const category = prompt(
    'Nouvelle catégorie :',
    bookmark.category
  );

  bookmark.title =
  title?.trim() || bookmark.title;

  bookmark.category =
  category?.trim() || bookmark.category;

  save();

  render();

  renderCategories();

  showToast("✅ Favori modifié");

}

async function importBookmarks(file){

  try{

    const text = await file.text();

    const ext =
    file.name
    .split('.')
    .pop()
    .toLowerCase();

    let imported = 0;

    if(ext === 'json'){

      const data = JSON.parse(text);

      const arr = Array.isArray(data)
      ? data
      : data.bookmarks || [];

      arr.forEach(item => {

        if(!item.url) return;

        if(bookmarks.some(b => b.url === item.url)) return;

        bookmarks.unshift({

          id:crypto.randomUUID(),

          title:item.title || 'Sans titre',

          url:item.url,

          category:item.category || 'Import JSON',

          createdAt:new Date().toISOString()

        });

        imported++;

      });

    }

    else if(ext === 'txt'){

      const lines = text.split('\n');

      lines.forEach(line => {

        line = line.trim();

        if(!line) return;

        if(!line.startsWith('http')){
          line = 'https://' + line;
        }

        if(!validateUrl(line)) return;

        if(bookmarks.some(b => b.url === line)) return;

        let host = line;

        try{
          host = new URL(line).hostname;
        }catch{}

        bookmarks.unshift({

          id:crypto.randomUUID(),

          title:host,

          url:line,

          category:'Import TXT',

          createdAt:new Date().toISOString()

        });

        imported++;

      });

    }

    else if(ext === 'html'){

      const doc = new DOMParser()
      .parseFromString(text,'text/html');

      const links = doc.querySelectorAll('a');

      links.forEach(link => {

        const href =
        link.href ||
        link.getAttribute('href');

        if(!href) return;

        if(bookmarks.some(b => b.url === href)) return;

        bookmarks.unshift({

          id:crypto.randomUUID(),

          title:
          link.textContent.trim() || href,

          url:href,

          category:'Import HTML',

          createdAt:new Date().toISOString()

        });

        imported++;

      });

    }

    save();

    render();

    updateStats();

    renderCategories();

    showToast(`✅ ${imported} favoris importés`);

  }catch(error){

    console.error(error);

    showToast('❌ Erreur import');

  }

}

document
.getElementById('addForm')
.addEventListener('submit',addBookmark);

document
.getElementById('search')
.addEventListener('input',e => {

  currentFilter = e.target.value;

  render();

});

document
.getElementById('sortSelect')
.addEventListener('change',render);

document
.getElementById('exportBtn')
.addEventListener('click',() => {

  try{

    const data = JSON.stringify(
      bookmarks,
      null,
      2
    );

    const blob = new Blob(
      [data],
      {type:'application/json'}
    );

    const url = URL.createObjectURL(blob);

    const a = document.createElement('a');

    a.href = url;

    a.download = 'bookmark-vault-export.json';

    document.body.appendChild(a);

    a.click();

    document.body.removeChild(a);

    URL.revokeObjectURL(url);

    showToast('✅ Export réussi');

  }catch(error){

    console.error(error);

    showToast('❌ Export impossible');

  }

});

const importBtn =
document.getElementById('importBtn');

const importFile =
document.getElementById('importFile');

const dropZone =
document.getElementById('dropZone');

importBtn.addEventListener('click',() => {
  importFile.click();
});

dropZone.addEventListener('click',() => {
  importFile.click();
});

importFile.addEventListener('change',e => {

  const file = e.target.files[0];

  if(file){
    importBookmarks(file);
  }

});

dropZone.addEventListener('dragover',e => {

  e.preventDefault();

  dropZone.classList.add('border-[#8ab4ff]');

});

dropZone.addEventListener('dragleave',() => {

  dropZone.classList.remove('border-[#8ab4ff]');

});

dropZone.addEventListener('drop',e => {

  e.preventDefault();

  dropZone.classList.remove('border-[#8ab4ff]');

  const file = e.dataTransfer.files[0];

  if(file){
    importBookmarks(file);
  }

});

render();
updateStats();
renderCategories();

showToast('✅ Bookmark Vault prêt');

</script>

</body>
</html>
