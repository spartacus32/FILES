<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Bookmark Vault Ultimate</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<style>

:root{
  --bg:#06070b;
  --surface:#10131a;
  --line:rgba(255,255,255,0.08);

  --text:#f5f7fa;
  --muted:#9aa4b2;

  --accent:#8ab4ff;
  --accent2:#6ee7ff;

  --radius:28px;

  color-scheme:dark;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  background:
  radial-gradient(circle at top left,
  rgba(138,180,255,0.10),
  transparent 20%),

  radial-gradient(circle at bottom right,
  rgba(110,231,255,0.08),
  transparent 25%),

  var(--bg);

  color:var(--text);

  font-family:'Inter',sans-serif;

  min-height:100vh;

}

.container-main{
  width:min(1350px,92%);
  margin:auto;
  padding-bottom:60px;
}

.hero{
  padding-top:90px;
  padding-bottom:60px;
}

.title{
  font-size:clamp(3rem,8vw,6rem);
  line-height:0.95;
  font-family:'Plus Jakarta Sans',sans-serif;
}

.subtitle{
  margin-top:24px;
  max-width:700px;
  color:var(--muted);
  line-height:1.8;
}

.layout{
  display:grid;
  grid-template-columns:1.7fr 0.8fr;
  gap:28px;
}

.panel{
  background:linear-gradient(
  180deg,
  rgba(255,255,255,0.04),
  rgba(255,255,255,0.02));

  border:1px solid var(--line);

  border-radius:var(--radius);

  padding:30px;

  backdrop-filter:blur(20px);
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
}

.tag{
  padding:10px 16px;
  border-radius:999px;
  background:rgba(138,180,255,0.08);
  color:#cfe0ff;
  font-size:13px;
}

.search{
  display:flex;
  gap:14px;
  margin-top:24px;
}

.input{
  width:100%;
  background:var(--surface);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:22px;
  padding:18px 20px;
  color:white;
  outline:none;
}

.input:focus{
  border-color:rgba(138,180,255,0.4);
  box-shadow:0 0 0 4px rgba(138,180,255,0.08);
}

.btn{
  border:none;
  cursor:pointer;
  border-radius:20px;
  padding:14px 20px;
  font-weight:600;
  transition:0.3s;
}

.btn-primary{
  background:linear-gradient(
  135deg,
  #dbeafe,
  #8ab4ff);

  color:#06111f;
}

.btn-primary:hover{
  transform:translateY(-2px);
}

.btn-secondary{
  background:rgba(255,255,255,0.05);
  color:white;
}

.btn-danger{
  background:rgba(255,100,100,0.15);
  color:#ff6b6b;
}

.cards{
  margin-top:34px;

  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:18px;
}

.card{
  background:
  linear-gradient(
  180deg,
  rgba(255,255,255,0.04),
  rgba(255,255,255,0.02));

  border:1px solid rgba(255,255,255,0.06);

  border-radius:24px;

  padding:22px;

  transition:0.3s;

  display:flex;
  flex-direction:column;
}

.card:hover{
  transform:translateY(-5px);
  border-color:rgba(138,180,255,0.25);
}

.card-content{
  flex:1;
}

.card-top{
  display:flex;
  gap:16px;
}

.favicon{
  width:48px;
  height:48px;
  border-radius:14px;
  background:#0b1017;
  padding:8px;
}

.card-title{
  font-weight:700;
  line-height:1.4;
}

.category{
  margin-top:10px;

  display:inline-flex;

  padding:8px 12px;

  border-radius:999px;

  background:rgba(138,180,255,0.08);

  font-size:12px;
}

.url{
  margin-top:20px;
  color:var(--muted);
  word-break:break-all;
  font-size:14px;
}

.card-actions{
  display:flex;
  gap:10px;
  margin-top:18px;
  padding-top:18px;
  border-top:1px solid rgba(255,255,255,0.05);
}

.card-actions a,
.card-actions button{
  flex:1;
  text-align:center;
  text-decoration:none;
}

.toast{
  position:fixed;
  right:20px;
  bottom:20px;

  background:#10151f;

  border:1px solid rgba(255,255,255,0.08);

  padding:18px 22px;

  border-radius:20px;

  opacity:0;

  transform:translateY(20px);

  transition:0.3s;

  z-index:999;
}

.toast.show{
  opacity:1;
  transform:translateY(0);
}

.import-zone{
  margin-top:28px;

  padding:28px;

  border-radius:24px;

  border:1px dashed rgba(255,255,255,0.12);

  text-align:center;
}

.footer{
  margin-top:80px;
  text-align:center;
  color:var(--muted);
  font-size:13px;
}

@media(max-width:980px){

  .layout{
    grid-template-columns:1fr;
  }

  .search{
    flex-direction:column;
  }

}

</style>
</head>

<body>

<div class="container-main">

<section class="hero">

<h1 class="title">
Bookmark Vault
</h1>

<p class="subtitle">
Organisez vos favoris dans une interface moderne,
rapide et élégante.
</p>

</section>

<section class="layout">

<div class="panel">

<div class="topbar">

<div>
<p style="color:var(--muted);font-size:14px;">
Bibliothèque personnelle
</p>

<h2 style="margin-top:10px;font-size:2rem;">
Vos favoris
</h2>
</div>

<div id="bookmarkCount" class="tag">
0 favoris
</div>

</div>

<div class="search">

<input
id="search"
class="input"
placeholder="Rechercher un favori..."
type="search"
/>

<button
id="clearSearch"
class="btn btn-secondary">
Effacer
</button>

</div>

<div id="cards" class="cards"></div>

</div>

<aside class="panel">

<h2 style="font-size:2rem;">
Ajouter un lien
</h2>

<form
id="addForm"
style="
margin-top:30px;
display:flex;
flex-direction:column;
gap:14px;
">

<input
id="title"
class="input"
placeholder="Nom du site"
required
/>

<input
id="url"
class="input"
placeholder="https://..."
required
/>

<input
id="category"
class="input"
placeholder="Catégorie"
/>

<button
type="submit"
class="btn btn-primary">
Ajouter le favori
</button>

</form>

<div class="import-zone">

<h3>
Importer des favoris
</h3>

<p style="
margin-top:12px;
color:var(--muted);
line-height:1.7;
font-size:14px;
">
HTML, JSON, TXT
</p>

<button
id="importBtn"
class="btn btn-secondary"
style="
width:100%;
margin-top:20px;
">
Choisir un fichier
</button>

<input
id="importFile"
type="file"
accept=".html,.json,.txt"
hidden
/>

</div>

</aside>

</section>

<footer class="footer">
Bookmark Vault Ultimate • 2026
</footer>

</div>

<div id="toast" class="toast"></div>

<script>

const STORAGE_KEY = "bookmark_vault_ultimate";

let items =
JSON.parse(
localStorage.getItem(STORAGE_KEY)
|| "[]"
);

function save(){

  localStorage.setItem(
    STORAGE_KEY,
    JSON.stringify(items)
  );

}

function toast(message){

  const el =
  document.getElementById("toast");

  el.textContent = message;

  el.classList.add("show");

  setTimeout(() => {

    el.classList.remove("show");

  },2500);

}

function favicon(url){

  try{

    const domain =
    new URL(url).hostname;

    return `https://www.google.com/s2/favicons?sz=128&domain=${domain}`;

  }catch{

    return "";

  }

}

function render(filter=""){

  const cards =
  document.getElementById("cards");

  cards.innerHTML = "";

  const filtered =
  items.filter(item => {

    const text =
    (
      (item.title || "") +
      (item.url || "") +
      (item.category || "")
    ).toLowerCase();

    return text.includes(
      filter.toLowerCase()
    );

  });

  document.getElementById(
  "bookmarkCount")
  .textContent =
  `${filtered.length} favoris`;

  if(!filtered.length){

    cards.innerHTML = `
    <div class="card">
      <p style="color:var(--muted);">
        Aucun favori trouvé.
      </p>
    </div>
    `;

    return;

  }

  filtered.forEach(item => {

    const card =
    document.createElement("div");

    card.className = "card";

    card.innerHTML = `

    <div class="card-content">

      <div class="card-top">

        <img
        class="favicon"
        src="${favicon(item.url)}"
        />

        <div>

          <div class="card-title">
            ${item.title || "Sans titre"}
          </div>

          <div class="category">
            ${item.category || "Divers"}
          </div>

        </div>

      </div>

      <div class="url">
        ${item.url}
      </div>

    </div>

    <div class="card-actions">

      <a
      href="${item.url}"
      target="_blank"
      class="btn btn-primary">
      Visiter
      </a>

      <button
      class="btn btn-danger"
      onclick="deleteBookmark('${item.id}')">
      Supprimer
      </button>

    </div>

    `;

    cards.appendChild(card);

  });

}

function deleteBookmark(id){

  items =
  items.filter(
  item => item.id !== id
  );

  save();

  render();

  toast("Favori supprimé");

}

render();

document
.getElementById("addForm")
.addEventListener("submit", e => {

  e.preventDefault();

  const title =
  document.getElementById("title")
  .value.trim();

  let url =
  document.getElementById("url")
  .value.trim();

  const category =
  document.getElementById("category")
  .value.trim();

  if(!/^https?:\/\//i.test(url)){

    url = "https://" + url;

  }

  const bookmark = {

    id:crypto.randomUUID(),

    title,

    url,

    category,

    createdAt:new Date().toISOString()

  };

  items.unshift(bookmark);

  save();

  render();

  e.target.reset();

  toast("Favori ajouté");

});

document
.getElementById("search")
.addEventListener("input", e => {

  render(e.target.value);

});

document
.getElementById("clearSearch")
.addEventListener("click", () => {

  document.getElementById(
  "search").value = "";

  render();

});

const importBtn =
document.getElementById(
"importBtn"
);

const importFile =
document.getElementById(
"importFile"
);

importBtn.addEventListener(
"click",
() => {

  importFile.click();

});

importFile.addEventListener(
"change",
async e => {

  const file =
  e.target.files[0];

  if(file){

    await handleImport(file);

  }

});

async function handleImport(file){

  try{

    const extension =
    file.name
    .split(".")
    .pop()
    .toLowerCase();

    const text =
    await file.text();

    let imported = 0;

    if(extension === "html"){

      const doc =
      new DOMParser()
      .parseFromString(
      text,
      "text/html"
      );

      const links =
      doc.querySelectorAll("a");

      links.forEach(link => {

        const href =
        link.href ||
        link.getAttribute("href");

        if(!href) return;

        const exists =
        items.some(
        i => i.url === href
        );

        if(exists) return;

        items.unshift({

          id:crypto.randomUUID(),

          title:
          link.textContent.trim()
          || href,

          url:href,

          category:"Import HTML"

        });

        imported++;

      });

    }

    else if(extension === "json"){

      const data =
      JSON.parse(text);

      const bookmarks =
      Array.isArray(data)
      ? data
      : data.bookmarks || [];

      bookmarks.forEach(bookmark => {

        if(!bookmark.url) return;

        const exists =
        items.some(
        i => i.url === bookmark.url
        );

        if(exists) return;

        items.unshift({

          id:crypto.randomUUID(),

          title:
          bookmark.title ||
          "Sans titre",

          url:
          bookmark.url,

          category:
          bookmark.category ||
          "Import JSON"

        });

        imported++;

      });

    }

    else if(extension === "txt"){

      const lines =
      text.split("\n");

      lines.forEach(line => {

        line = line.trim();

        if(!line) return;

        if(!/^https?:\/\//i.test(line)){

          line =
          "https://" + line;

        }

        const exists =
        items.some(
        i => i.url === line
        );

        if(exists) return;

        items.unshift({

          id:crypto.randomUUID(),

          title:
          new URL(line).hostname,

          url:line,

          category:"Import TXT"

        });

        imported++;

      });

    }

    save();

    render();

    toast(
    `✅ ${imported} favoris importés`
    );

  }catch(error){

    console.error(error);

    toast(
    "❌ Erreur pendant l'import"
    );

  }

}

</script>

</body>
</html>
